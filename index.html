<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Scroll Animation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- OPGAVE 1: sec1 – Én H1, ingen H2, beskrivende p-tekst om VIA Biler -->
    <section class="sec1 show-animate">
        <h1 class="animate">Velkommen til VIA Biler</h1>
        <p class="animate">VIA Biler er din lokale bilforhandler med et bredt udvalg af kvalitetsbiler. Vi tilbyder professionel rådgivning og fair priser.</p>
    </section>

    <!-- OPGAVE 2: sec2 – H2-overskrift og en kort tekst -->
    <section class="sec2">
        <h2 class="animate">Vores biler</h2>
        <p class="animate">Klik på et bil-kort for at høre motoren brumme og se mere information.</p>
    </section>

    <section class="sec5">
        <div class="images">
            <figure class="card" id="horseCard">
                <img src="img/img1.jpg" alt="Horse">
                <figcaption>
                    <p class="animal-description">Horse</p>
                    <p class="animal-description">Type: Mammal</p>
                    <p class="animal-description">Lifespan: 25–30 years</p>
                </figcaption>
            </figure>

            <figure class="card" id="bearCard">
                <img src="img/img2.jpg" alt="Bear">
                <figcaption>
                    <p class="animal-description">Polar Bear</p>
                    <p class="animal-description">Type: Mammal</p>
                    <p class="animal-description">Lifespan: 20–25 years</p>
                </figcaption>
            </figure>

            <figure class="card" id="dogCard">
                <img src="img/img3.jpg" alt="Dog">
                <figcaption>
                    <p class="animal-description">Dog</p>
                    <p class="animal-description">Type: Mammal</p>
                    <p class="animal-description">Lifespan: 10–15 years</p>
                </figcaption>
            </figure>
        </div>
    </section>

<script src="js/script.js"></script>
</body>
</html>
