<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Scroll Animation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- OPGAVE 1: sec1 – Én H1, ingen H2, beskrivende p-tekst om VIA Biler -->
    <section class="sec1 show-animate">
        <h1 class="animate">Velkommen til VIA Biler</h1>
        <p class="animate">VIA Biler er din lokale bilforhandler med et bredt udvalg af kvalitetsbiler. Vi tilbyder professionel rådgivning og fair priser.</p>
    </section>

    <!-- OPGAVE 2: sec2 – H2-overskrift og en kort tekst -->
    <section class="sec2">
        <h2 class="animate">Vores biler</h2>
        <p class="animate">Klik på et bil-kort for at høre motoren brumme og se mere information.</p>
    </section>

    <!-- OPGAVE 3, 4, 5: sec5 – Opdaterede id'er, billeder og figcaption-tekster -->
    <section class="sec5">
        <div class="images">

            <!-- id="car1", billede: car1.jpg, figcaption fra carinfo.txt -->
            <figure class="card" id="car1">
                <img src="img/car1.jpg" alt="Lamborghini Huracán">
                <figcaption>
                    <p class="animal-description">Lamborghini Huracán</p>
                    <p class="animal-description">Mærke: Lamborghini</p>
                    <p class="animal-description">Tophastighed: 325 km/t</p>
                </figcaption>
            </figure>

            <!-- id="car2", billede: car2.jpg, figcaption fra carinfo.txt -->
            <figure class="card" id="car2">
                <img src="img/car2.jpg" alt="Porsche 911">
                <figcaption>
                    <p class="animal-description">Porsche 911</p>
                    <p class="animal-description">Mærke: Porsche</p>
                    <p class="animal-description">Tophastighed: 280 km/t</p>
                </figcaption>
            </figure>

            <!--id="car3", billede: car3.jpg, figcaption fra carinfo.txt -->
            <figure class="card" id="car3">
                <img src="img/car3.jpg" alt="Mercedes-AMG GT R">
                <figcaption>
                    <p class="animal-description">Mercedes-AMG GT R</p>
                    <p class="animal-description">Mærke: Mercedes-AMG</p>
                    <p class="animal-description">Tophastighed: 318 km/t</p>
                </figcaption>
            </figure>

        </div>
    </section>

<script src="js/script.js"></script>
</body>
</html>
